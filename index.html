<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3am. Portfolio</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 GSAP 與 ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <!-- 引入 Lenis (處理平滑捲動) -->
    <script src="https://unpkg.com/lenis@1.1.2/dist/lenis.min.js"></script>
    
    <!-- 引入字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        html, body {
            overflow-x: hidden;
            width: 100%;
            max-width: 100vw;
            overscroll-behavior-x: none; 
            background-color: #000;
        }

        body {
            color: #fff;
            font-family: 'Inter', sans-serif;
            /* 收緊總長度至 6500px，減少空窗期 */
            height: 6500px; 
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #eab308; border-radius: 4px; } /* 黃色 Scrollbar */

        .nav-link {
            position: relative;
            transition: color 0.3s ease;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -4px;
            left: 0;
            background-color: #fff;
            transition: width 0.3s ease;
        }
        .nav-link:hover::after { width: 100%; }

        /* --- 基礎設定 --- */
        #logo-wrapper {
            position: fixed;
            z-index: 40; 
            transform-origin: center center; 
            will-change: transform, opacity, filter;
            pointer-events: none; 
        }

        #logo-wrapper path {
            fill: #ffffff;
            stroke: transparent;
            will-change: fill, stroke, stroke-width;
        }

        #launch-ui-wrapper {
            position: fixed;
            z-index: 55;
            display: flex;
            flex-direction: column;
            will-change: transform, opacity;
            pointer-events: none; 
        }

        #rocket-wrapper {
            position: fixed;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            will-change: bottom;
            pointer-events: none; 
        }
        
        #rocket-drift {
            will-change: transform;
        }

        #trail-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            pointer-events: none;
            z-index: 10;
        }

        .circle-particle {
            position: absolute;
            border-radius: 50%;
            border: 2px solid;
            background: transparent;
            opacity: 0;
            will-change: transform, opacity, width, height;
        }

        .char-particle {
            display: inline-block;
            will-change: transform, opacity, filter;
        }

        /* --- 自訂鼠標 Custom Cursor 設定 --- */
        @media (pointer: fine) {
            body, a, button, .cursor-pointer { cursor: none !important; } 
        }

        #custom-cursor {
            position: fixed;
            top: 0; left: 0; 
            width: 20px; height: 20px;
            border: 1.5px solid #fff;
            border-radius: 50%;
            pointer-events: none; 
            z-index: 9999;
            transition: width 0.3s ease, height 0.3s ease, background-color 0.3s ease, border-color 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            mix-blend-mode: difference; 
            will-change: transform; /* GPU 加速 */
        }

        #custom-cursor.hover-nav {
            width: 60px;
            height: 60px;
            background-color: #fff;
            border-color: #fff;
        }

        #custom-cursor.hover-img {
            width: 100px;
            height: 100px;
            background-color: #eab308; 
            border-color: #eab308;
            mix-blend-mode: normal; 
        }

        #custom-cursor span {
            color: #000;
            font-size: 13px;
            font-weight: 600;
            opacity: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: opacity 0.3s ease;
        }

        #custom-cursor.hover-img span {
            opacity: 1;
        }
    </style>
</head>

        if (window.matchMedia("(pointer: fine)").matches) {
            const cursor = document.getElementById('custom-cursor');
            
            gsap.set(cursor, { xPercent: -50, yPercent: -50 });
            
            let xTo = gsap.quickTo(cursor, "x", {duration: 0.15, ease: "power3"}),
                yTo = gsap.quickTo(cursor, "y", {duration: 0.15, ease: "power3"});

            window.addEventListener("mousemove", e => {
                xTo(e.clientX);
                yTo(e.clientY);
            });

            document.querySelectorAll('.nav-link, #sticky-logo').forEach(link => {
                link.addEventListener('mouseenter', () => cursor.classList.add('hover-nav'));
                link.addEventListener('mouseleave', () => cursor.classList.remove('hover-nav'));
            });

            document.querySelectorAll('.portfolio-item').forEach(item => {
                item.addEventListener('mouseenter', () => cursor.classList.add('hover-img'));
                item.addEventListener('mouseleave', () => cursor.classList.remove('hover-img'));
            });
        } else {
            document.getElementById('custom-cursor').style.display = 'none';
        }

        // --- 倒數文字拆解 ---
        const launchTexts = document.querySelectorAll('.launch-text');
        launchTexts.forEach(p => {
            const words = p.textContent.trim().replace(/\s+/g, ' ').split(' ');
            p.innerHTML = words.map(word => {
                const chars = word.split('').map(char => `<span class="char-particle inline-block">${char}</span>`).join('');
                return `<span class="inline-block whitespace-nowrap">${chars}</span>`;
            }).join(' ');
        });

        gsap.from(".launch-text .char-particle", {
            opacity: 0, x: () => (Math.random() - 0.5) * 100, y: () => (Math.random() - 0.5) * 100,
            rotation: () => (Math.random() - 0.5) * 90, filter: "blur(8px)", scale: () => Math.random() * 2,
            stagger: { amount: 0.8, from: "random" }, ease: "power2.out", duration: 1.5, delay: 0.2
        });

        // --- 處理倒數邏輯 ---
        const launchUi = document.getElementById('launch-ui');
        const countdownNum = document.getElementById('countdown-num');
        let currentTick = 3;

        gsap.fromTo(countdownNum, 
            { opacity: 0, filter: "blur(12px)", scale: 2, x: () => (Math.random() - 0.5) * 150, y: () => (Math.random() - 0.5) * 150, rotation: () => (Math.random() - 0.5) * 90 }, 
            { opacity: 0.6, filter: "blur(0px)", scale: 1, x: 0, y: 0, rotation: 0, duration: 1, ease: "power3.out", delay: 0.5 }
        );

        window.addEventListener('scroll', () => {
            let sy = window.scrollY;
            let newTick = 3;
            if (sy < 150) newTick = 3; else if (sy < 300) newTick = 2; else if (sy < 450) newTick = 1; else newTick = 0;

            if (currentTick !== newTick) {
                currentTick = newTick;
                if (newTick > 0) {
                    countdownNum.innerText = newTick;
                    launchUi.style.opacity = 1;
                    gsap.fromTo(countdownNum, 
                        { opacity: 0, filter: "blur(12px)", scale: 2, x: () => (Math.random() - 0.5) * 150, y: () => (Math.random() - 0.5) * 150, rotation: () => (Math.random() - 0.5) * 90 }, 
                        { opacity: 0.6, filter: "blur(0px)", scale: 1, x: 0, y: 0, rotation: 0, duration: 0.8, ease: "power3.out", overwrite: true }
                    );
                } else {
                    launchUi.style.opacity = 0; 
                }
            }
        });

        // --- GSAP RWD 動畫與長捲動核心邏輯 ---
        let mm = gsap.matchMedia();

        mm.add({
            isMobile: "(max-width: 767px)",
            isTablet: "(min-width: 768px) and (max-width: 1023px)",
            isDesktop: "(min-width: 1024px)"
        }, (context) => {
            let { isMobile, isTablet, isDesktop } = context.conditions;
            const trailContainer = document.getElementById('trail-container');
            trailContainer.innerHTML = ''; 

            let masterTl = gsap.timeline({
                scrollTrigger: { trigger: "body", start: "top top", end: "bottom bottom", scrub: 1 }
            });
            masterTl.to({}, { duration: 100 }); 

            gsap.set("#logo-wrapper path", { fill: "#ffffff", stroke: "transparent", strokeWidth: 0 });
            gsap.set("#sticky-logo", { opacity: 0 });

            if (isDesktop) {
                gsap.set("#logo-wrapper", { top: "50%", left: "-4vw", width: "70vw", yPercent: -50, scale: 1, xPercent: 0 });
                gsap.set("#rocket-wrapper", { right: "15%", left: "auto", xPercent: 50, bottom: 0 });
                gsap.set("#launch-ui-wrapper", { right: "15%", left: "auto", xPercent: 50, top: "50%", bottom: "auto", yPercent: -50 });
                launchUi.className = "flex flex-col items-center text-center transition-opacity duration-300";
            } else if (isTablet) {
                gsap.set("#logo-wrapper", { top: "50%", left: "-6vw", width: "85vw", yPercent: -50, scale: 1, xPercent: 0 });
                gsap.set("#rocket-wrapper", { right: "10%", left: "auto", xPercent: 50, bottom: 0 });
                gsap.set("#launch-ui-wrapper", { right: "10%", left: "auto", xPercent: 50, top: "50%", bottom: "auto", yPercent: -50 });
                launchUi.className = "flex flex-col items-center text-center transition-opacity duration-300";
            } else {
                gsap.set("#logo-wrapper", { top: "48%", left: "-10vw", width: "115vw", yPercent: -50, scale: 1, xPercent: 0 });
                gsap.set("#rocket-wrapper", { left: "50%", right: "auto", xPercent: -50, bottom: 0 });
                gsap.set("#launch-ui-wrapper", { left: "24px", right: "auto", bottom: "40px", top: "auto", yPercent: 0, xPercent: 0 });
                launchUi.className = "flex flex-col items-start text-left transition-opacity duration-300";
            }

            let rocketTargetBottom = isMobile ? "25%" : "50%";
            masterTl.to("#rocket-wrapper", { bottom: rocketTargetBottom, ease: "none", duration: 15 }, 10);

            masterTl.to("#rocket-drift", {
                keyframes: { "0%": { y: 0, ease: "power2.out" }, "50%": { y: 40, ease: "power2.inOut" }, "100%": { y: 0, ease: "power2.out" } },
                duration: 15
            }, 10);
            
            masterTl.to("#rocket-drift", {
                keyframes: { "0%": { y: 0, ease: "sine.inOut" }, "50%": { y: -15, ease: "sine.inOut" }, "100%": { y: 0, ease: "sine.inOut" } },
                duration: 50 
            }, 25);

            masterTl.to("#logo-wrapper path", {
                fill: "rgba(255, 255, 255, 0)", stroke: "rgba(255, 255, 255, 1)", strokeWidth: isMobile ? 3 : 1.5,
                duration: 7, ease: "power1.inOut"
            }, 35);

            masterTl.to("#logo-wrapper", {
                scale: 1.25, opacity: 0, filter: "blur(12px)", yPercent: -60, duration: 10, ease: "power2.in"
            }, 42);

            masterTl.to("#sticky-logo", { opacity: 1, duration: 5, ease: "power2.inOut" }, 55);

            masterTl.to("#rocket-wrapper", { bottom: "120%", ease: "none", duration: 15 }, 75);

            // 動態粒子尾跡
            const colors = ['#EF4444', '#10B981', '#3B82F6', '#F59E0B', '#FFFFFF'];
            const numBubbles = 100;
            let rocketCenterPos = isMobile ? { left: "50%", xPercent: -50 } : { right: "15%", xPercent: 50 };
            let rocketFinalBottomNumber = isMobile ? 25 : 50; 

            for (let i = 0; i < numBubbles; i++) {
                let circle = document.createElement('div');
                circle.className = 'circle-particle';
                let targetSize = Math.random() * 30 + 15; let rand = Math.random();
                if (rand > 0.6) targetSize += 40; if (rand > 0.85) targetSize += 100; if (rand > 0.95) targetSize += 150 + Math.random() * 100; 

                circle.style.borderColor = colors[Math.floor(Math.random() * colors.length)];
                trailContainer.appendChild(circle);

                let spawnTime = 10 + (i / numBubbles) * 80; 
                let rBottomVal = spawnTime < 25 ? ((spawnTime - 10) / 15) * rocketFinalBottomNumber : (spawnTime > 75 ? rocketFinalBottomNumber + ((spawnTime - 75) / 15) * 70 : rocketFinalBottomNumber);

                let initialOffsetX = (Math.random() - 0.5) * 40; 
                masterTl.set(circle, { bottom: `calc(${rBottomVal}% - 20px)`, y: 0, width: 0, height: 0, opacity: 0, ...rocketCenterPos }, spawnTime);

                let lifeDuration = 15 + Math.random() * 15; 
                let dropY = Math.random() * 500 + 400; 
                let finalOffsetX = initialOffsetX + (Math.random() - 0.5) * 400; 
                
                masterTl.to(circle, { opacity: 1, width: targetSize * 0.15, height: targetSize * 0.15, duration: lifeDuration * 0.05, ease: "power2.out" }, spawnTime);
                masterTl.to(circle, { y: dropY, x: finalOffsetX, width: targetSize, height: targetSize, duration: lifeDuration * 0.95, ease: "power1.out" }, spawnTime + lifeDuration * 0.05);
                masterTl.to(circle, { opacity: 0, duration: lifeDuration * 0.25, ease: "power2.inOut" }, spawnTime + Math.max(0, lifeDuration * 0.75));
            }

            // 確保每次重新計數時，完美清空
            return () => {
                masterTl.kill(); 
                gsap.set("#logo-wrapper, #logo-wrapper path, #sticky-logo, #rocket-wrapper, #rocket-drift, #launch-ui-wrapper", { clearProps: "all" });
                trailContainer.innerHTML = ''; 
            };
        });

        // --- 火箭引擎高頻震動特效 ---
        let shakeTween = gsap.to("#rocket-svg-container", {
            x: () => Math.random() * 4 - 2, y: () => Math.random() * 4 - 2, rotation: () => Math.random() * 2 - 1,
            duration: 0.1, repeat: -1, yoyo: true, ease: "none", paused: true 
        });

        ScrollTrigger.create({
            trigger: "body", start: "500px top", end: "5000px top",   
            onEnter: () => shakeTween.play(), onLeave: () => shakeTween.pause(),
            onEnterBack: () => shakeTween.play(), onLeaveBack: () => shakeTween.pause()
        });

        // --- 釘選文字 (Text Pinning) 🚨 補回漏掉嘅 .join(' ') 修復 DOM 陣列 Bug ---
        const mainTextElement = document.querySelector("#text-section p");
        const text = mainTextElement.textContent.trim().replace(/\s+/g, ' '); 
        mainTextElement.innerHTML = text.split(' ').map(word => {
            if (!word) return '';
            const chars = word.split('').map(char => `<span class="char-particle inline-block">${char}</span>`).join('');
            return `<span class="inline-block whitespace-nowrap">${chars}</span>`;
        }).join(' ');

        let textTl = gsap.timeline({
            scrollTrigger: { trigger: "#text-trigger", start: "center center", end: "+=1500", pin: true, scrub: 1 }
        });
        textTl.from("#text-trigger .char-particle", { opacity: 0, x: () => (Math.random() - 0.5) * 500, y: () => (Math.random() - 0.5) * 500, rotation: () => (Math.random() - 0.5) * 90, filter: "blur(8px)", scale: () => Math.random() * 3, stagger: { amount: 1, from: "random" }, ease: "power2.out", duration: 2 });
        textTl.to({}, { duration: 3 }); 
        textTl.to("#text-trigger .char-particle", { opacity: 0, y: -150, filter: "blur(4px)", stagger: { amount: 0.5, from: "start" }, ease: "power2.in", duration: 1.5 });

        // --- 核心 Parallax 修復：清除舊有 Stagger，改用純淨 Scrub true ---
        mm.add("(min-width: 768px)", () => {
            const portfolioItems = gsap.utils.toArray(".portfolio-item");
            portfolioItems.forEach((item, index) => {
                let speeds = [1.5, 0.5, 1.0]; 
                let speed = speeds[index];

                gsap.fromTo(item,
                    { y: 400 * speed }, 
                    {
                        y: -400 * speed, 
                        ease: "none",
                        scrollTrigger: {
                            trigger: "#portfolio-section",
                            start: "top bottom",
                            end: "bottom top",
                            scrub: true // 極致跟手，唔會再亂跳！
                        }
                    }
                );
            });
            
            return () => { gsap.set(".portfolio-item", { clearProps: "all" }); };
        });

        // 手機版取消 Parallax，保持清爽向上滑入
        mm.add("(max-width: 767px)", () => {
            gsap.from(".portfolio-item", {
                y: 50, opacity: 0, duration: 1, stagger: 0.2, ease: "power2.out",
                scrollTrigger: { trigger: "#portfolio-section", start: "top 85%" }
            });
            return () => { gsap.set(".portfolio-item", { clearProps: "all" }); };
        });

    </script>
</body>
</html>
