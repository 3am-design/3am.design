<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="color-scheme" content="dark">
    <title>3am. Design Studio</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 GSAP 與 ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <!-- 引入 Lenis (處理平滑捲動) -->
    <script src="https://unpkg.com/lenis@1.1.2/dist/lenis.min.js"></script>
    
    <!-- 引入字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        html, body {
            overflow-x: hidden;
            width: 100%;
            max-width: 100vw;
            overscroll-behavior-x: none; 
            background-color: #000;
        }

        body {
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 7000px; 
        }

        /* --- Nav Link Hover 點點特效 --- */
        .nav-link {
            position: relative;
            transition: color 0.3s ease;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            width: 5px;
            height: 5px;
            bottom: -10px;
            left: 50%;
            border-radius: 50%;
            background-color: #fff;
            opacity: 0;
            transform: translateX(-50%) translateY(3px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .nav-link:hover::after { 
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* --- 基礎設定 --- */
        #logo-wrapper {
            position: fixed;
            z-index: 40; 
            transform-origin: center center; 
            will-change: transform, opacity, filter;
            pointer-events: none; 
        }

        #logo-wrapper path {
            fill: #ffffff;
            stroke: #ffffff;
            stroke-width: 0;
            vector-effect: non-scaling-stroke; 
            will-change: fill-opacity, stroke-opacity, stroke-width, stroke-dashoffset;
        }

        #launch-ui-wrapper {
            position: fixed;
            z-index: 55;
            display: flex;
            flex-direction: column;
            will-change: transform, opacity;
            pointer-events: none; 
        }

        #rocket-wrapper {
            position: fixed;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            will-change: bottom;
            pointer-events: none;
            mix-blend-mode: difference; 
        }
        
        #rocket-wrapper svg path {
            fill: #ffffff;
        }
        
        #rocket-drift {
            will-change: transform;
        }

        /* 獨立嘅文字 Wrapper，專責處理精準對位，絕不與火箭綁定升降 */
        #summary-wrapper {
            position: fixed;
            z-index: 45;
            display: flex;
            flex-direction: column;
            align-items: center;
            will-change: bottom, transform;
            pointer-events: none;
        }

        #trail-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100dvh;
            pointer-events: none;
            z-index: 10;
        }

        .circle-particle {
            position: absolute;
            border-radius: 50%;
            border: 2px solid;
            background: transparent;
            opacity: 0;
            will-change: transform, opacity, width, height;
        }

        .char-particle {
            display: inline-block;
            will-change: transform, opacity, filter;
        }

        /* --- 自訂鼠標 Custom Cursor 設定 --- */
        @media (pointer: fine) {
            body, a, button, .cursor-pointer { cursor: none !important; } 
        }

        #custom-cursor {
            position: fixed;
            top: 0; left: 0; 
            width: 20px; height: 20px;
            border: 1.5px solid #fff;
            border-radius: 50%;
            pointer-events: none; 
            z-index: 9999;
            transition: width 0.3s ease, height 0.3s ease, background-color 0.3s ease, border-color 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            mix-blend-mode: difference; 
            will-change: transform;
        }

        #custom-cursor.hover-nav {
            width: 60px; height: 60px;
            background-color: #fff; border-color: #fff;
        }

        #custom-cursor.hover-img {
            width: 100px; height: 100px;
            background-color: #eab308; border-color: #eab308;
            mix-blend-mode: normal; 
        }

        #custom-cursor span {
            color: #000; font-size: 13px; font-weight: 600;
            opacity: 0; text-transform: uppercase; letter-spacing: 1px;
            transition: opacity 0.3s ease;
        }

        #custom-cursor.hover-img span {
            opacity: 1;
        }
    </style>
</head>

    <script>
        // --- 核心防彈修復 ---
        gsap.registerPlugin(ScrollTrigger);
        ScrollTrigger.config({ ignoreMobileResize: true });

        // Lenis 初始化 (Smooth Scrolling)
        const lenis = new Lenis({
            duration: 1.6, 
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), 
            smoothWheel: true,
        });

        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time) => { lenis.raf(time * 1000); });
        gsap.ticker.lagSmoothing(0, 0);

        // --- Custom Cursor 動態邏輯 ---
        if (window.matchMedia("(pointer: fine)").matches) {
            const cursor = document.getElementById('custom-cursor');
            
            gsap.set(cursor, { xPercent: -50, yPercent: -50 });
            
            let xTo = gsap.quickTo(cursor, "x", {duration: 0.15, ease: "power3"}),
                yTo = gsap.quickTo(cursor, "y", {duration: 0.15, ease: "power3"});

            window.addEventListener("mousemove", e => {
                xTo(e.clientX);
                yTo(e.clientY);
            });

            document.querySelectorAll('.nav-link, #sticky-logo').forEach(link => {
                link.addEventListener('mouseenter', () => cursor.classList.add('hover-nav'));
                link.addEventListener('mouseleave', () => cursor.classList.remove('hover-nav'));
            });

            document.querySelectorAll('.portfolio-item').forEach(item => {
                item.addEventListener('mouseenter', () => cursor.classList.add('hover-img'));
                item.addEventListener('mouseleave', () => cursor.classList.remove('hover-img'));
            });
        } else {
            document.getElementById('custom-cursor').style.display = 'none';
        }

        let pulseTween = gsap.fromTo("#launch-circle", 
            { opacity: 1 }, 
            { opacity: 0, repeat: -1, yoyo: true, duration: 0.6, ease: "power1.inOut", paused: true }
        );

        let isScrolled = false;
        window.addEventListener('scroll', () => {
            if (window.scrollY > 10 && !isScrolled) {
                isScrolled = true;
                pulseTween.pause();
                gsap.to("#launch-circle", { opacity: 1, duration: 0.2 });
            } else if (window.scrollY <= 10 && isScrolled) {
                isScrolled = false;
                pulseTween.play();
            }
        });

        // 準備 Option A (Laser Draw)
        const logoPaths = document.querySelectorAll('#logo-wrapper path');
        logoPaths.forEach(path => {
            const length = path.getTotalLength();
            path.style.strokeDasharray = length;
            path.style.strokeDashoffset = length;
            path.style.strokeWidth = "1.5px";
            path.style.fillOpacity = "0";
            path.style.strokeOpacity = "1";
        });

        let initTl = gsap.timeline({
            onComplete: () => {
                if (!isScrolled) pulseTween.play();
            }
        });

        initTl.to("#logo-wrapper path", {
            strokeDashoffset: 0,
            duration: 2.5,
            ease: "power2.inOut",
            stagger: 0.15
        }, 0.2);

        initTl.to("#logo-wrapper path", {
            fillOpacity: 1,
            strokeOpacity: 0,
            duration: 1.5,
            ease: "power2.out",
            stagger: 0.1
        }, 1.8);

        initTl.fromTo(".launch-text", 
            { y: 15, opacity: 0, filter: "blur(4px)" }, 
            { y: 0, opacity: 1, filter: "blur(0px)", duration: 1.2, stagger: 0.2, ease: "power3.out" }, 
            1.5
        );

        initTl.fromTo(".launch-line-bg", 
            { scaleY: 0 }, 
            { scaleY: 1, duration: 1.5, ease: "power3.inOut" }, 
            2.0
        );

        initTl.fromTo(".summary-line", 
            { x: 15, opacity: 0 }, 
            { x: 0, opacity: 1, duration: 1.2, stagger: 0.15, ease: "power3.out" }, 
            2.2
        );

        initTl.fromTo("#launch-circle", 
            { scale: 0, opacity: 0 }, 
            { scale: 1, opacity: 1, duration: 0.6, ease: "back.out(1.7)" }, 
            3.0
        );

        initTl.fromTo(".nav-link",
            { y: -10, opacity: 0 },
            { y: 0, opacity: 1, duration: 1.2, stagger: 0.15, ease: "power3.out" },
            3.8
        );

        let mm = gsap.matchMedia();

        mm.add({
            isMobile: "(max-width: 767px)",
            isTablet: "(min-width: 768px) and (max-width: 1023px)",
            isDesktop: "(min-width: 1024px)"
        }, (context) => {
            let { isMobile, isTablet, isDesktop } = context.conditions;
            const trailContainer = document.getElementById('trail-container');
            trailContainer.innerHTML = ''; 

            let masterTl = gsap.timeline({
                scrollTrigger: { trigger: "body", start: "top top", end: "bottom bottom", scrub: 1 }
            });
            masterTl.to({}, { duration: 100 }); 

            gsap.set("#sticky-logo", { opacity: 0 });

            // Resize 走位
            if (isDesktop) {
                gsap.set("#logo-wrapper", { top: "50dvh", left: "-4vw", width: "70vw", yPercent: -50, scale: 1, xPercent: 0 });
                gsap.set(["#rocket-wrapper", "#summary-wrapper"], { right: "15%", left: "auto", xPercent: 50, bottom: "0%" });
                gsap.set("#launch-ui-wrapper", { right: "15%", left: "auto", xPercent: 50, top: "50dvh", bottom: "auto", yPercent: -50 });
            } else if (isTablet) {
                gsap.set("#logo-wrapper", { top: "50dvh", left: "-6vw", width: "85vw", yPercent: -50, scale: 1, xPercent: 0 });
                gsap.set(["#rocket-wrapper", "#summary-wrapper"], { right: "10%", left: "auto", xPercent: 50, bottom: "0%" });
                gsap.set("#launch-ui-wrapper", { right: "10%", left: "auto", xPercent: 50, top: "50dvh", bottom: "auto", yPercent: -50 });
            } else {
                gsap.set("#logo-wrapper", { top: "30dvh", left: "50%", width: "135vw", yPercent: -50, scale: 1, xPercent: -50 });
                gsap.set(["#rocket-wrapper", "#summary-wrapper"], { left: "50%", right: "auto", xPercent: -50, bottom: "0%" }); 
                gsap.set("#launch-ui-wrapper", { left: "50%", right: "auto", xPercent: -50, top: "60dvh", bottom: "auto", yPercent: -50 });
            }

            let rocketStartBottomNum = 0; 
            let rocketMidBottomNum = isMobile ? 15 : 50;
            // 🚨 將原本嘅 70 (Desktop) 同 35 (Mobile) 減半！
            let rocketHighBottomNum = isMobile ? 25 : 60;

            // 火箭郁，細字直接向下飛！
            masterTl.to("#rocket-wrapper", { bottom: `${rocketMidBottomNum}%`, ease: "none", duration: 15 }, 10);
            masterTl.to("#summary-wrapper", { y: "100vh", duration: 15, ease: "power2.in" }, 10);

            masterTl.to("#launch-line-active", { height: "100%", duration: 10, ease: "none" }, 0);
            masterTl.to("#launch-ui-wrapper", { autoAlpha: 0, duration: 5, ease: "power2.in" }, 10);

            masterTl.to("#rocket-drift", {
                keyframes: { "0%": { y: 0, ease: "power2.out" }, "50%": { y: 40, ease: "power2.inOut" }, "100%": { y: 0, ease: "power2.out" } },
                duration: 15
            }, 10);
            
            masterTl.to("#rocket-drift", {
                keyframes: { "0%": { y: 0, ease: "sine.inOut" }, "50%": { y: -15, ease: "sine.inOut" }, "100%": { y: 0, ease: "sine.inOut" } },
                duration: 50 
            }, 25);

            masterTl.to("#logo-wrapper path", {
                fillOpacity: 0, strokeOpacity: 1, strokeWidth: isMobile ? 3 : 1.5,
                duration: 7, ease: "power1.inOut"
            }, 35);

            masterTl.to("#logo-wrapper", {
                y: "150vh",       
                scale: 1.1,       
                opacity: 1,       
                duration: 12, 
                ease: "power2.in"
            }, 40);

            masterTl.to("#rocket-wrapper", { 
                bottom: `${rocketHighBottomNum}%`, 
                duration: 12, 
                ease: "power2.inOut" 
            }, 40);

            masterTl.to("#sticky-logo", { opacity: 1, duration: 5, ease: "power2.inOut" }, 55);
            
            masterTl.to("#rocket-wrapper", { bottom: "120%", ease: "none", duration: 15 }, 82);

            const colors = ['#EF4444', '#10B981', '#3B82F6', '#F59E0B', '#FFFFFF'];
            const numBubbles = 100;
            
            let rocketCenterPos;
            if (isDesktop) {
                rocketCenterPos = { right: "15%", left: "auto", xPercent: 50 };
            } else if (isTablet) {
                rocketCenterPos = { right: "10%", left: "auto", xPercent: 50 };
            } else {
                rocketCenterPos = { left: "50%", right: "auto", xPercent: -50 };
            }
            
            let particleOffset = isMobile ? 40 : 20;

            let getRocketBottom = (t) => {
                if (t <= 10) return rocketStartBottomNum;
                if (t <= 25) return rocketStartBottomNum + ((t - 10) / 15) * (rocketMidBottomNum - rocketStartBottomNum);
                if (t <= 40) return rocketMidBottomNum;
                if (t <= 52) return rocketMidBottomNum + ((t - 40) / 12) * (rocketHighBottomNum - rocketMidBottomNum);
                if (t <= 82) return rocketHighBottomNum;
                if (t <= 97) return rocketHighBottomNum + ((t - 82) / 15) * (120 - rocketHighBottomNum);
                return 120;
            };

            for (let i = 0; i < numBubbles; i++) {
                let circle = document.createElement('div');
                circle.className = 'circle-particle';
                let targetSize = Math.random() * 30 + 15; let rand = Math.random();
                if (rand > 0.6) targetSize += 40; if (rand > 0.85) targetSize += 100; if (rand > 0.95) targetSize += 150 + Math.random() * 100; 

                circle.style.borderColor = colors[Math.floor(Math.random() * colors.length)];
                trailContainer.appendChild(circle);

                let spawnTime = 10 + (i / numBubbles) * 85; 
                let rBottomVal = getRocketBottom(spawnTime); 
                let initialOffsetX = (Math.random() - 0.5) * 40; 
                
                masterTl.set(circle, { bottom: `calc(${rBottomVal}% - ${particleOffset}px)`, y: 0, x: initialOffsetX, width: 0, height: 0, opacity: 0, ...rocketCenterPos }, spawnTime);

                let lifeDuration = 15 + Math.random() * 15; 
                let dropY = Math.random() * 500 + 400; 
                let finalOffsetX = initialOffsetX + (Math.random() - 0.5) * 400; 
                
                masterTl.to(circle, { opacity: 1, width: targetSize * 0.15, height: targetSize * 0.15, duration: lifeDuration * 0.05, ease: "power2.out" }, spawnTime);
                masterTl.to(circle, { y: dropY, x: finalOffsetX, width: targetSize, height: targetSize, duration: lifeDuration * 0.95, ease: "power1.out" }, spawnTime + lifeDuration * 0.05);
                masterTl.to(circle, { opacity: 0, duration: lifeDuration * 0.25, ease: "power2.inOut" }, spawnTime + Math.max(0, lifeDuration * 0.75));
            }

            return () => {
                masterTl.kill(); 
                gsap.set("#logo-wrapper, #logo-wrapper svg, #logo-wrapper path, #sticky-logo, #rocket-wrapper, #rocket-drift, #summary-wrapper, #vehicle-summary, .summary-line, .launch-text, .launch-line-bg, #launch-ui-wrapper, #launch-circle, #launch-line-active", { clearProps: "all" });
                trailContainer.innerHTML = ''; 
            };
        });

        // --- 火箭引擎高頻震動 ---
        let shakeTween = gsap.to("#rocket-svg-container", {
            x: () => Math.random() * 4 - 2, y: () => Math.random() * 4 - 2, rotation: () => Math.random() * 2 - 1,
            duration: 0.1, repeat: -1, yoyo: true, ease: "none", paused: true 
        });

        ScrollTrigger.create({
            trigger: "body", start: "500px top", end: "5000px top",   
            onEnter: () => shakeTween.play(), onLeave: () => shakeTween.pause(),
            onEnterBack: () => shakeTween.play(), onLeaveBack: () => shakeTween.pause()
        });

        // --- 釘選文字 ---
        const mainTextElement = document.querySelector("#text-section p");
        const text = mainTextElement.textContent.trim().replace(/\s+/g, ' '); 
        mainTextElement.innerHTML = text.split(' ').map(word => {
            if (!word) return '';
            const chars = word.split('').map(char => `<span class="char-particle inline-block">${char}</span>`).join('');
            return `<span class="inline-block whitespace-nowrap">${chars}</span>`;
        }).join(' ');

        let textTl = gsap.timeline({
            scrollTrigger: { trigger: "#text-trigger", start: "center center", end: "+=1500", pin: true, scrub: 1 }
        });
        textTl.from("#text-trigger .char-particle", { opacity: 0, x: () => (Math.random() - 0.5) * 500, y: () => (Math.random() - 0.5) * 500, rotation: () => (Math.random() - 0.5) * 90, filter: "blur(8px)", scale: () => Math.random() * 3, stagger: { amount: 1, from: "random" }, ease: "power2.out", duration: 2 });
        textTl.to({}, { duration: 3 }); 
        textTl.to("#text-trigger .char-particle", { opacity: 0, y: -150, filter: "blur(4px)", stagger: { amount: 0.5, from: "start" }, ease: "power2.in", duration: 1.5 });

        // --- Portfolio 滑入 ---
        mm.add("(min-width: 768px)", () => {
            gsap.from(".portfolio-item", {
                y: 150, opacity: 0, duration: 1.5, stagger: 0.3, ease: "power3.out", 
                scrollTrigger: { trigger: "#portfolio-section", start: "top 80%", toggleActions: "play none none reverse" }
            });
        });

        mm.add("(max-width: 767px)", () => {
            gsap.from(".portfolio-item", {
                y: 60, opacity: 0, duration: 1.2, stagger: 0, ease: "power3.out", 
                scrollTrigger: { trigger: "#portfolio-section", start: "top 85%", toggleActions: "play none none reverse" }
            });
        });

    </script>
</body>
</html>
